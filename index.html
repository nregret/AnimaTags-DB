<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    window.addEventListener('error', function(e) {
      alert("JS Error: " + e.message + "\nFile: " + e.filename + "\nLine: " + e.lineno);
    });
    window.addEventListener('unhandledrejection', function(e) {
      alert("Unhandled Promise Rejection: " + e.reason);
    });
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anima Background Index & Selector</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#07070e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    .topbar .logo-sub {
      font-size: 0.65rem;
      color: #64748b;
      margin-left: 10px;
      font-weight: 500;
    }
    
    .source-select-wrapper {
      margin-right: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #64748b;
    }
    .source-select-wrapper select {
      background: #0f0c1b;
      color: #f472b6;
      border: 1px solid rgba(219, 39, 119, 0.2);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.78rem;
      cursor: pointer;
      outline: none;
    }
    
    .github-link {
      margin-left: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.7);
      transition: color 0.2s, opacity 0.2s;
    }
    .github-link:hover {
      color: #f472b6;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="bg-fx"></div>

  <header class="topbar">
    <a class="brand" href="#">
      <img class="brand-mark" src="favicon-32x32.png" alt="AnimaBackground">
      <span class="brand-name">Anima<b>Background</b></span>
    </a>
    <a class="github-link" href="https://github.com/nregret/AnimaBackground" target="_blank" rel="noopener noreferrer" title="GitHub 仓库">
      <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
      </svg>
    </a>

    <!-- Mobile sidebar filter toggle -->
    <button type="button" id="filters-toggle" class="filters-toggle"
            aria-label="Open filters" aria-expanded="false"
            aria-controls="sidebar">
      <span class="ham" aria-hidden="true">☰</span>
      <span>Filters</span>
    </button>

    <div class="search" style="margin-left: auto;">
      <input id="q" type="search" autocomplete="off" spellcheck="false"
             placeholder="Search backgrounds or tags…">
      <button type="button" id="search-go" class="search-icon"
              aria-label="Search">⌕</button>
    </div>

    <!-- Language display switch -->
    <div class="source-select-wrapper">
      <span>Language:</span>
      <select id="lang-select">
        <option value="bilingual" selected>Bilingual (中英)</option>
        <option value="en">English (英文)</option>
      </select>
    </div>

    <div class="sort" id="sort">
      <button data-sort="id-desc">Latest</button>
      <button data-sort="id-asc" class="on">Oldest</button>
      <button data-sort="az">A–Z</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <button type="button" id="sidebar-close" class="sidebar-close"
              aria-label="Close filters">×</button>
      <div class="sidebar-title">Filters</div>
      <div id="facets">
        <!-- 动态渲染 Categories、Folders 和 Traits 过滤器 -->
      </div>
    </aside>

    <main class="main">
      <div class="resultbar">
        <span id="resultcount" class="rc">共找到 <b>0</b> 款背景</span>
        <div class="activechips" id="chips">
          <!-- 存放已选筛选条件面包屑 -->
        </div>
        <button type="button" class="clearall" id="clearall" hidden>清除全部</button>
      </div>

      <section class="gallery" id="gallery">
        <!-- 服装卡片网格 -->
      </section>

      <div class="pager" id="pager" hidden>
        <!-- 分页（如有需要，我们支持直接滚动或者全显示） -->
      </div>
    </main>
  </div>

  <div class="toast" id="toast"><b>✦</b> Copied!</div>

  <script src="app.js" type="module"></script>
</body>
</html>
